<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadiah Buat Ko Handy❤️❤️❤️</title>
    <style>
        /* CSS RESET & FIX CENTERING */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Jaga konten tetap di tengah horizontal */
            justify-content: center; /* Jaga konten tetap di tengah vertikal */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            overflow: hidden; /* Mencegah layar goyang di HP */
            color: #333;
            text-align: center;
        }

        /* 1. KONTEN SELALU DI TENGAH LAYAR HP */
        #gameWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            position: relative;
        }

        /* 2. LABEL TETAP DI DEPAN (Fix Poin 2) */
        #mainLabel {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 20px;
            z-index: 1000; /* Angka tinggi agar tidak tertimpa tombol */
            pointer-events: none; /* User tidak sengaja klik text */
            transition: color 0.2s;
        }

        /* AREA UNTUK TOMBOL-TOMBOL LARIAN */
        #buttonArea {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; /* Di bawah label */
        }

        .btn-target {
            padding: 14px 28px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute; /* Default absolute agar bisa lari */
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: translate(-50%, -50%); /* Sentris posisi saat lari */
            transition: background 0.2s;
        }

        /* 3. LAYAR RETAK (Fix Poin 3) */
        #crackOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://p7.hiclipart.com/preview/554/770/118/glass-crack-desktop-wallpaper-screen-shatter.jpg');
            background-size: cover;
            background-position: center;
            z-index: 9999; /* Paling atas */
            display: none;
            pointer-events: none;
        }

        /* TOMBOL POSISI DIAM (UNTUK READY) */
        .static-btn {
            position: static !important;
            margin-top: 20px;
            transform: none !important;
            z-index: 1001;
        }

        /* LOADING SPINNER */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
            display: none;
            z-index: 1001;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* 4. VIDEO PENUH KIRI KANAN (Fix Poin 4 seperti Gambar 1) */
        #videoContainer {
            width: 100vw; /* Penuh lebar viewport */
            height: 100vh; /* Penuh tinggi viewport */
            position: fixed;
            top: 0; left: 0;
            z-index: 10000;
            background-color: black; /* Latar video hitam */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #videoContainer h2 { color: white; margin-bottom: 10px; font-size: 20px; }

        #videoContainer iframe {
            width: 100% !important; /* Penuh lebar HP */
            height: 100% !important; /* Penuh tinggi HP (Drive akan nyesuaiin) */
            border: none;
        }
    </style>
</head>
<body>

    <div id="crackOverlay"></div>

    <div id="gameWrapper">
        <h1 id="mainLabel">Ko Handy, ada hadiah buat kamuuuu!<br>Cepat klik tombol di bawah:</h1>
        
        <div id="loaderIcon" class="loader"></div>
        
        <div id="buttonArea">
            <button id="mainBtn" class="btn-target" style="top: 50%; left: 50%;">Klik di Sini</button>
        </div>
    </div>

    <div id="videoContainer">
        <h2>🎁 KEJUTAAAN! 🎁</h2>
        <iframe src="https://drive.google.com/file/d/1Z49LW8gbR6HNCcwwNbBTJIuEu5m4Tkxl/preview" allow="autoplay" allowfullscreen></iframe>
    </div>

    <script>
        const label = document.getElementById('mainLabel');
        const mainBtn = document.getElementById('mainBtn');
        const buttonArea = document.getElementById('buttonArea');
        const loader = document.getElementById('loaderIcon');
        const crackOverlay = document.getElementById('crackOverlay');
        const videoContainer = document.getElementById('videoContainer');
        const wrapper = document.getElementById('gameWrapper');

        let clickCount = 0;
        let isStarted = false;
        let timerSeconds = 0;
        let gameActive = true;

        // Mendapatkan batas area wrapper yang aman
        function getSafeBounds() {
            const wrapRect = wrapper.getBoundingClientRect();
            return {
                maxX: wrapRect.width,
                maxY: wrapRect.height
            };
        }

        // Memindahkan elemen ke posisi acak di dalam wrapper
        function moveElement(el) {
            const bounds = getSafeBounds();
            // Jarak aman 40px dari pinggir
            const padding = 40;
            el.style.left = padding + Math.random() * (bounds.maxX - padding*2) + 'px';
            el.style.top = padding + Math.random() * (bounds.maxY - padding*2) + 'px';
        }

        // Membuat tombol kloning
        function createClones() {
            for (let i = 0; i < 2; i++) {
                const newBtn = mainBtn.cloneNode(true);
                newBtn.id = ""; // Hapus ID agar tidak duplikat
                newBtn.addEventListener('click', handleBtnClick);
                newBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleBtnClick(); });
                buttonArea.appendChild(newBtn);
                moveElement(newBtn);
            }
        }

        function startTimer() {
            const interval = setInterval(() => {
                timerSeconds++;
                
                // Perubahan Label setiap 5 detik
                if (timerSeconds === 5) label.innerHTML = "Ayooo cepat klik buttonnya! Nanti hadiahnya batal!";
                if (timerSeconds === 10) label.innerHTML = "Kalau males klik.... <br>Males deh kasih hadiahnya";
                if (timerSeconds === 15) {
                    label.innerHTML = "Loading...";
                    loader.style.display = "block";
                }

                if (timerSeconds >= 20) {
                    clearInterval(interval);
                    finishPhase1();
                }
            }, 1000);
        }

        function handleBtnClick(e) {
            if (!gameActive) return;
            
            if (!isStarted) {
                isStarted = true;
                startTimer();
            }

            clickCount++;
            
            // Semua tombol bergerak
            const allBtns = document.querySelectorAll('.btn-target');
            allBtns.forEach(btn => moveElement(btn));
            
            // Gandakan tombol
            createClones();
        }

        // Pancing event click pertama
        mainBtn.addEventListener('click', handleBtnClick);
        mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleBtnClick(); });

        function finishPhase1() {
            gameActive = false;
            buttonArea.innerHTML = ""; // Bersihkan semua tombol larian
            loader.style.display = "none";

            if (clickCount > 8) {
                // Skenario 5a: Virus
                label.innerHTML = "Virus terdeteksi di dalam handphone......<br>Yuk kita doa bapa kami supaya sehat selalu<br><br><b>Ko Handy yang pimpin ya</b>";
                loader.style.display = "block";
                
                setTimeout(() => {
                    showCrackPrank();
                }, 20000); // Loading 20 detik
            } else {
                // Skenario 5b: Loyo
                label.innerHTML = "Yah ko Handy loyo banget dalam pencet tombol<br>ULANGI!!!";
                setTimeout(() => {
                    location.reload(); 
                }, 3000);
            }
        }

        function showCrackPrank() {
            loader.style.display = "none";
            crackOverlay.style.display = "block"; // Layar Retak muncul
            
            label.innerHTML = "";
            const repairBtn = document.createElement('button');
            repairBtn.className = "btn-target static-btn"; // Pakai class static agar diam
            repairBtn.innerText = "Perbaiki";
            wrapper.appendChild(repairBtn); // Ditaruh langsung di wrapper agar tengah

            repairBtn.onclick = () => {
                crackOverlay.style.display = "none";
                repairBtn.remove();
                label.innerHTML = "Biar awet dan panjang umur...<br>Yuk kita doa salam maria dan kemuliaan.<br><br><b>Ko Handy yang pimpin ya</b>";
                loader.style.display = "block";

                setTimeout(() => {
                    finalPhase();
                }, 20000); // Loading 20 detik
            };
        }

        function finalPhase() {
            loader.style.display = "none";
            label.innerHTML = "Sudah siap?<br>Naikkan volume hp dulu ko";
            
            const readyBtn = document.createElement('button');
            readyBtn.className = "btn-target static-btn";
            readyBtn.innerText = "Readyyyy";
            wrapper.appendChild(readyBtn);

            readyBtn.onclick = () => {
                wrapper.classList.add('hidden'); // Sembunyikan semua konten game
                videoContainer.style.display = 'flex'; // Tampilkan video fullscreen
            };
        }
    </script>
</body>
</html>
