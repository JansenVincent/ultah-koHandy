<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadiah Buat Ko Handy❤️❤️❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
            text-align: center;
        }

        /* Container utama */
        #gameWrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #mainLabel {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px; /* Memberi jarak ke tombol di bawahnya */
            z-index: 1000; 
            pointer-events: none;
            position: relative;
        }

        /* Container tombol agar tidak lari ke atas di awal */
        #initialBtnContainer {
            z-index: 1001;
            position: relative;
        }

        /* Area larian tombol (hanya aktif setelah klik pertama) */
        #buttonArea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
        }

        .btn-target {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            touch-action: none;
            white-space: nowrap;
        }

        /* Gambar Retak */
        #crackOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparentpng.com/download/glass-crack/Y8z6S7-glass-crack-transparent-background.png');
            background-size: cover;
            background-position: center;
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #videoContainer {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0; left: 0;
            z-index: 10000;
            background-color: black;
            display: none;
            flex-direction: column;
        }
        #videoContainer iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="crackOverlay"></div>

    <div id="gameWrapper">
        <h1 id="mainLabel">Ko Handy, ada hadiah buat kamuuuu!<br>Cepat klik tombol di bawah:</h1>
        
        <div id="loaderIcon" class="loader"></div>

        <div id="initialBtnContainer">
            <button id="mainBtn" class="btn-target">Klik di Sini</button>
        </div>

        <div id="buttonArea"></div>
    </div>

    <div id="videoContainer">
        <iframe src="https://drive.google.com/file/d/1Z49LW8gbR6HNCcwwNbBTJIuEu5m4Tkxl/preview" allow="autoplay"></iframe>
    </div>

    <script>
        const label = document.getElementById('mainLabel');
        const mainBtn = document.getElementById('mainBtn');
        const initialContainer = document.getElementById('initialBtnContainer');
        const buttonArea = document.getElementById('buttonArea');
        const loader = document.getElementById('loaderIcon');
        const crackOverlay = document.getElementById('crackOverlay');
        const videoContainer = document.getElementById('videoContainer');
        const wrapper = document.getElementById('gameWrapper');

        let clickCount = 0;
        let isStarted = false;
        let timerSeconds = 0;
        let gameActive = true;

        function moveElement(el) {
            el.style.position = 'absolute';
            const padding = 60;
            const maxX = window.innerWidth - el.clientWidth - padding;
            const maxY = window.innerHeight - el.clientHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px';
        }

        function createClones() {
            for (let i = 0; i < 2; i++) {
                const newBtn = document.createElement('button');
                newBtn.className = "btn-target";
                newBtn.innerText = "Klik di Sini";
                newBtn.addEventListener('click', handleBtnClick);
                newBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleBtnClick(); });
                buttonArea.appendChild(newBtn);
                moveElement(newBtn);
            }
        }

        function startTimer() {
            const interval = setInterval(() => {
                timerSeconds++;
                if (timerSeconds === 5) label.innerHTML = "Ayooo cepat klik buttonnya! Nanti hadiahnya batal!";
                if (timerSeconds === 10) label.innerHTML = "Kalau males klik.... <br>Males deh kasih hadiahnya";
                if (timerSeconds === 15) { label.innerHTML = "Loading..."; loader.style.display = "block"; }

                if (timerSeconds >= 20) {
                    clearInterval(interval);
                    finishPhase1();
                }
            }, 1000);
        }

        function handleBtnClick() {
            if (!gameActive) return;

            if (!isStarted) {
                isStarted = true;
                // Masukkan tombol utama ke area larian setelah diklik pertama kali
                buttonArea.appendChild(mainBtn);
                startTimer();
            }
            
            clickCount++;
            
            // Gerakkan semua tombol
            const allBtns = document.querySelectorAll('.btn-target');
            allBtns.forEach(btn => moveElement(btn));
            createClones();
        }

        mainBtn.addEventListener('click', handleBtnClick);
        mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleBtnClick(); });

        function finishPhase1() {
            gameActive = false;
            buttonArea.innerHTML = ""; 
            initialContainer.innerHTML = "";
            loader.style.display = "none";

            if (clickCount > 8) {
                label.innerHTML = "Virus terdeteksi di dalam handphone......<br>Yuk kita doa bapa kami supaya sehat selalu<br><br><b>Ko Handy yang pimpin ya</b>";
                loader.style.display = "block";
                setTimeout(showCrackPrank, 20000);
            } else {
                label.innerHTML = "Yah ko Handy loyo banget dalam pencet tombol<br>ULANGI!!!";
                setTimeout(() => location.reload(), 3000);
            }
        }

        function showCrackPrank() {
            loader.style.display = "none";
            crackOverlay.style.display = "block"; 
            label.innerHTML = "";
            
            const repairBtn = document.createElement('button');
            repairBtn.className = "btn-target";
            repairBtn.innerText = "Perbaiki";
            repairBtn.style.zIndex = "10000";
            initialContainer.appendChild(repairBtn);

            repairBtn.onclick = () => {
                crackOverlay.style.display = "none";
                repairBtn.remove();
                label.innerHTML = "Biar awet dan panjang umur...<br>Yuk kita doa salam maria dan kemuliaan.<br><br><b>Ko Handy yang pimpin ya</b>";
                loader.style.display = "block";
                setTimeout(finalPhase, 20000);
            };
        }

        function finalPhase() {
            loader.style.display = "none";
            label.innerHTML = "Sudah siap?<br>Naikkan volume hp dulu ko";
            const readyBtn = document.createElement('button');
            readyBtn.className = "btn-target";
            readyBtn.innerText = "Readyyyy";
            readyBtn.style.zIndex = "10000";
            initialContainer.appendChild(readyBtn);

            readyBtn.onclick = () => {
                wrapper.style.display = 'none';
                videoContainer.style.display = 'flex';
            };
        }
    </script>
</body>
</html>
