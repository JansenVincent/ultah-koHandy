<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejar Aku!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Mengetengahkan secara horizontal */
            justify-content: center; /* Mengetengahkan secara vertikal */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Warna soft pink agar lebih estetik */
            overflow: hidden; /* Supaya tidak ada scrollbar saat tombol lari */
        }

        #container {
            text-align: center;
            padding: 20px;
            z-index: 1; /* Supaya label tetap di bawah tombol jika perlu */
        }

        #mainLabel {
            font-size: 22px;
            color: #880e4f;
            margin-bottom: 30px; /* Jarak antara label dan tombol */
            line-height: 1.5;
        }

        #btnRun {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s;
            touch-action: none; /* Mencegah layar geser di HP */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            
            /* Penting: Defaultnya relatif terhadap container, 
            tapi saat lari akan berubah jadi absolute via JS */
            position: relative;
        }

        #videoContainer {
            display: none;
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="mainLabel">Ada pesan penting buat kamu!<br>Coba klik tombol di bawah:</h1>
        <button id="btnRun">Klik di Sini</button>
    </div>

    <div id="videoContainer">
        <h2 style="color: #ad1457;">🎉 HAPPY BIRTHDAY! 🎉</h2>
        <iframe width="300" height="500" 
            src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1" 
            frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>

    <script>
        const btn = document.getElementById('btnRun');
        const label = document.getElementById('mainLabel');
        const videoSection = document.getElementById('videoContainer');
        const container = document.getElementById('container');
        let canBeClicked = false;

        const moveButton = () => {
            if (!canBeClicked) {
                // Ubah posisi jadi absolute agar bisa lari ke seluruh layar
                btn.style.position = 'absolute';
                
                // Hitung batas layar agar tidak keluar
                const maxX = window.innerWidth - btn.clientWidth;
                const maxY = window.innerHeight - btn.clientHeight;
                
                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }
        };

        // Event lari untuk Desktop (Mouse) & HP (Sentuh)
        btn.addEventListener('mouseover', moveButton);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // Timer 30 detik untuk muncul pesan capek
        setTimeout(() => {
            label.innerHTML = "Capek ngejar tombolnya? <br><br> Doa Bapa Kami dulu ya sampe selesai, <br> baru tombolnya mau diem!";
            
            // Timer tambahan (misal 20 detik) untuk waktu berdoa
            setTimeout(() => {
                canBeClicked = true;
                btn.style.position = 'relative'; // Balik ke posisi semula (di bawah label)
                btn.style.left = '0';
                btn.style.top = '0';
                btn.style.margin = '20px auto';
                btn.innerHTML = "Sekarang Klik Aku!";
                btn.style.backgroundColor = "#4caf50";
            }, 20000); 

        }, 30000);

        btn.addEventListener('click', () => {
            if (canBeClicked) {
                container.style.display = 'none';
                videoSection.style.display = 'block';
            }
        });
    </script>
</body>
</html>
